<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Visiting Italy and start planning your trip.">
    <title>Contact - Visiting Italy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav aria-label="Primary">
        <a href="index.html" class="nav-logo" style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none;">ITALIA</a>
        
        <div class="hamburger" id="hamburger-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#activities">Activities</a></li>
            <li><a href="index.html#locations">Locations</a></li>
            <li><a href="index.html#gallery">Gallery</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
    
    <main class="contact-split-layout">
        <div class="contact-visual">
            <div class="contact-header-content">
                <h1>Contact</h1>
                <p class="contact-subtitle">Start your journey.</p>
                <div class="contact-details">
                    <p>Via Roma, 42<br>00184 Roma RM<br>Italy</p>
                    <p>
                        <a href="mailto:info@visitingitaly.com" class="email-link">info@visitingitaly.com</a>
                    </p>
                    <p><a href="index.html" class="back-link">← Back to Italy</a></p>
                </div>
            </div>
            <div class="overlay"></div>
        </div>

        <div class="contact-form-container">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="email@address.com" autocomplete="email" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Tell us about your travel plans..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>

    <script>
        // Mobile Menu Logic
        const nav = document.querySelector('nav');
        const hamburger = document.getElementById('hamburger-btn');
        const navLinks = document.getElementById('nav-links');
        
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('active');
            // Toggle blend mode handling class on nav
            nav.classList.toggle('menu-active');
        });

        // Close menu when a link is clicked
        document.querySelectorAll('.nav-links li a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                hamburger.classList.remove('active');
                nav.classList.remove('menu-active');
            });
        });
    </script>
</body>
</html>
